services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: eventdb 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/Backend.Dockerfile
    container_name: deploy-backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://devuser:devpass@db:5432/eventdb
      SECRET_KEY: dev-secret-key
    ports:
      - "8000:8000"

  collector:
    build:
      context: ..
      dockerfile: deploy/docker/Collector.Dockerfile
    container_name: deploy-collector
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://devuser:devpass@db:5432/eventdb
    ports:
      - "8001:8001"

  processor:
    build:
      context: ..
      dockerfile: deploy/docker/Processor.Dockerfile
    container_name: deploy-processor
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://devuser:devpass@db:5432/eventdb
    ports:
      - "8002:8002"

  alert_engine:
    build:
      context: ..
      dockerfile: deploy/docker/AlertEngine.Dockerfile
    container_name: deploy-alert_engine
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://devuser:devpass@db:5432/eventdb
    ports:
      - "8003:8003"

volumes:
  postgres_data:
